<!-- Narbar สำหรับเอาไป include ใน base.html -->
{% load static %}
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="{% url 'index' %}">
            <img src="{% static 'img/logo.png' %}" alt="DroneMarket" height="30">
        </a>
    </div>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="navbar-text me-5 text-white">
        👤 สวัสดี, {{ user.username }} 
    </div>
    <div class="collapse navbar-collapse" id="navbarNav">        
        <ul class="navbar-nav ms-auto">
            {% if user.is_authenticated %}
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'dashboard' %}">แดชบอร์ด</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'logout' %}">ออกจากระบบ</a>
                </li>
            {% else %}
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'login' %}">เข้าสู่ระบบ</a>
                </li>
            {% endif %}
        </ul>
    </div>  
</nav>
