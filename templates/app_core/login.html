{% extends 'base/base.html' %}
{% block title %}เข้าสู่ระบบ | DroneMarket{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm mt-5">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4">เข้าสู่ระบบ</h3>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_username" class="form-label">ชื่อผู้ใช้ (Username)</label>
                        <input type="text" name="username" class="form-control" id="id_username" required>
                    </div>
                    <div class="mb-3">
                        <label for="id_password" class="form-label">รหัสผ่าน (Password)</label>
                        <input type="password" name="password" class="form-control" id="id_password" required>
                    </div>
                    
                    {% if form.errors %}
                        <div class="alert alert-danger py-2 fs-6">ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง ลองใหม่อีกครั้ง</div>
                    {% endif %}
                    
                    <button type="submit" class="btn btn-primary w-100 mt-3">เข้าสู่ระบบ</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
